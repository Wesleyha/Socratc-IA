<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, Arial, Helvetica, sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #004A54;
            color: #fff;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: rgba(0,0,0,0.18);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.08);
            border-right: 1px solid #202020;
            display: flex;
            flex-direction: column;
            padding: 8px 6px;
        }

        .top-logo {
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .logo-box {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 2px;
        }

        .menu-item {
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 11px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            background: transparent;
            transition: background 0.25s ease, transform 0.2s ease;
        }

        .menu-item:hover {
            background: #1f1f1f;
            transform: translateX(3px);
        }

        .menu-item.active {
            background: transparent;
        }

        .menu-item.active:hover {
            background: #1f1f1f;
            transform: translateX(3px);
        }

        .icon {
            width: 18px;
            text-align: center;
            font-size: 16px;
        }

        .recentes-title {
            font-size: 13px;
            font-weight: 700;
            margin: 28px 10px 14px;
            color: #fff;
        }

        .history-item.active {
            background: #2f2f2f;
        }

        .recentes {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .recentes::-webkit-scrollbar {
            width: 8px;
        }

        .recentes::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .history-item {
            font-size: 14px;
            color: #fff;
            padding: 10px 10px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: #1d1d1d;
        }

        .main {
            flex: 1;
            min-height: 100vh;
            background: #004A54;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-main {
            height: 54px;
        }

        .welcome {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 25px;
            font-weight: 400;
            color: #fff;
            pointer-events: none;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 40px 140px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .msg {
            max-width: 70%;
            width: fit-content;
            margin: 4px 0;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .bot {
            align-self: flex-start;
            background: transparent;
            border: none;
            color: #eaeaea;
            padding-left: 0;
        }

        .voice {
            margin-top: 10px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: #2b2b2b;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.18s ease;
        }

        .voice:hover {
            background: #3a3a3a;
            transform: scale(1.04);
        }

        .status {
            position: absolute;
            bottom: 92px;
            left: 50%;
            transform: translateX(-50%);
            width: min(768px, calc(100% - 80px));
            font-size: 12px;
            color: #777;
            padding-left: 18px;
        }

        .input-wrapper {
            position: absolute;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            width: min(768px, calc(100% - 80px));
        }

        .input-box {
            height: 58px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 8px 0 20px;
            gap: 10px;

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.15),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .pergunta {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 15px;
        }

        .pergunta::placeholder {
            color: #aaa;
        }

        .action-btn {
            position: relative;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.18s ease;
        }

        .mic-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: transparent;
            color: #f1f1f1;
        }

        .mic-btn:hover {
            background: #333;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #f4f4f4;
            color: #000;
        }

        .send-btn:hover {
            background: #fff;
            transform: scale(1.04);
        }

        .clicked {
            animation: whiteRing 0.45s ease;
        }

        @keyframes whiteRing {
            0% {
                box-shadow: 0 0 0 0 rgba(255,255,255,0.95);
            }

            45% {
                box-shadow: 0 0 0 5px rgba(255,255,255,0.95),
                0 0 20px rgba(255,255,255,0.45);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255,255,255,0);
            }
        }

        svg {
            pointer-events: none;
        }

        @media (max-width: 800px) {
            .sidebar {
                display: none;
            }

            .input-wrapper {
                width: calc(100% - 28px);
                bottom: 18px;
            }

            .status {
                bottom: 82px;
                width: calc(100% - 28px);
            }

            .welcome {
                font-size: 22px;
                width: 100%;
                text-align: center;
            }

            .chat-area {
                padding: 20px 16px 125px;
            }

            .msg {
                max-width: 85%;
            }

            .user {
                align-self: flex-end;
            }

            .bot {
                align-self: flex-start;
            }
        }
    </style>
</head>

<body>

<aside class="sidebar">
    <div class="top-logo">
        <div class="logo-box">Socratic-IA</div>
    </div>

    <div class="menu">
        <div class="menu-item active" onclick="limparChat()">
            <span class="icon">✎</span>
            <span>Novo chat</span>
        </div>
    </div>

    <div class="recentes-title">Recentes</div>

    <div class="recentes" id="historicoLateral">

    </div>
</aside>

<main class="main">
    <div class="top-main"></div>

    <div class="welcome" id="welcome">Como posso ajudar?</div>

    <section class="chat-area" id="chat"></section>

    <div class="status" id="status">Pronto.</div>

    <div class="input-wrapper">
        <div class="input-box">
            <input
                    class="pergunta"
                    id="pergunta"
                    placeholder="Pergunte alguma coisa"
                    onkeydown="enterEnviar(event)"
            >

            <button class="action-btn mic-btn" onclick="ouvir(this)" title="Falar">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
                    <path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M19 11C19 14.86 15.86 18 12 18C8.14 18 5 14.86 5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M12 18V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M8 22H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>

            <button class="action-btn send-btn" onclick="enviar(this)" title="Enviar">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12H19" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>
                    <path d="M13 6L19 12L13 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
</main>

<script>
    let sessaoAtualId = null;
    let ultimaResposta = "";

    let audioAtual = null;
    let tocando = false;

    window.onload = () => carregarHistorico();

    function animarBotao(botao) {
        if (!botao) return;
        botao.classList.remove("clicked");
        void botao.offsetWidth;
        botao.classList.add("clicked");

        setTimeout(() => botao.classList.remove("clicked"), 450);
    }

    function enterEnviar(event) {
        if (event.key === "Enter") enviar();
    }

    async function enviar(botao) {
        animarBotao(botao);

        const input = document.getElementById("pergunta");
        const pergunta = input.value.trim();

        if (!pergunta) return;

        esconderBoasVindas();
        adicionarMensagem(pergunta, "user");
        input.value = "";
        setStatus("Processando resposta...");

        try {
            let url = "http://localhost:8080/chat";

            if (sessaoAtualId !== null) {
                url += "?sessionId=" + sessaoAtualId;
            }

            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: pergunta
            });

            if (!response.ok) {
                throw new Error("Erro HTTP " + response.status);
            }

            const dados = await response.json();

            sessaoAtualId = dados.sessionId;
            ultimaResposta = dados.resposta;

            adicionarMensagem(dados.resposta, "bot", true);
            setStatus("Resposta recebida.");

            await carregarHistorico();

        } catch (e) {
            adicionarMensagem("Não foi possível conectar com a API.", "bot");
            setStatus("Erro de conexão.");
            console.error(e);
        }
    }

    function adicionarMensagem(texto, tipo, botaoVoz = false) {
        const chat = document.getElementById("chat");

        const div = document.createElement("div");
        div.className = "msg " + tipo;
        div.innerText = texto;

        if (botaoVoz) {
            const btn = document.createElement("button");
            btn.className = "voice";
            btn.title = "Ouvir resposta";

            btn.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M4 9V15H8L13 20V4L8 9H4Z"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"/>
                <path d="M16 9C16.8 9.8 17.2 10.8 17.2 12C17.2 13.2 16.8 14.2 16 15"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"/>
                <path d="M18.5 6.5C20 8 20.8 9.9 20.8 12C20.8 14.1 20 16 18.5 17.5"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"/>
            </svg>
        `;

            btn.onclick = () => {
                animarBotao(btn);
                falar(texto);
            };

            div.appendChild(document.createElement("br"));
            div.appendChild(btn);
        }

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function carregarHistorico() {
        try {
            const response = await fetch("http://localhost:8080/chat/sessoes");

            if (!response.ok) {
                throw new Error("Erro HTTP " + response.status);
            }

            const sessoes = await response.json();
            const lateral = document.getElementById("historicoLateral");

            lateral.innerHTML = "";

            sessoes.reverse().forEach(sessao => {
                const item = document.createElement("div");
                item.className = "history-item";
                item.dataset.id = sessao.id;

                item.innerText = sessao.titulo.length > 38
                    ? sessao.titulo.substring(0, 38) + "..."
                    : sessao.titulo;

                item.onclick = () => abrirSessao(sessao.id);

                lateral.appendChild(item);
            });

            marcarSessaoAtiva();

        } catch (e) {
            console.error("Erro ao carregar histórico:", e);
        }
    }

    async function abrirSessao(id) {
        try {
            sessaoAtualId = id;
            esconderBoasVindas();

            const chat = document.getElementById("chat");
            chat.innerHTML = "";

            const response = await fetch(
                "http://localhost:8080/chat/sessoes/" + id + "/mensagens"
            );

            if (!response.ok) {
                throw new Error("Erro HTTP " + response.status);
            }

            const mensagens = await response.json();

            mensagens.forEach(msg => {
                adicionarMensagem(msg.pergunta, "user");
                adicionarMensagem(msg.resposta, "bot", true);
            });

            setStatus("Conversa carregada.");
            marcarSessaoAtiva();

        } catch (e) {
            console.error(e);
            setStatus("Erro ao carregar conversa.");
        }
    }

    function marcarSessaoAtiva() {
        document.querySelectorAll(".history-item").forEach(item => {
            item.classList.remove("active");

            if (Number(item.dataset.id) === Number(sessaoAtualId)) {
                item.classList.add("active");
            }
        });
    }

    function limparChat() {
        sessaoAtualId = null;
        document.getElementById("chat").innerHTML = "";
        document.getElementById("welcome").style.display = "block";
        setStatus("Novo chat iniciado.");
        marcarSessaoAtiva();
    }

    function esconderBoasVindas() {
        document.getElementById("welcome").style.display = "none";
    }

    function ouvir(botao) {
        animarBotao(botao);

        const SpeechRecognition =
            window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert("Seu navegador não suporta reconhecimento de voz. Use o Google Chrome.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = "pt-BR";
        recognition.continuous = false;
        recognition.interimResults = false;

        setStatus("Ouvindo...");
        recognition.start();

        recognition.onresult = function(event) {
            document.getElementById("pergunta").value =
                event.results[0][0].transcript;

            setStatus("Voz reconhecida.");
            enviar();
        };

        recognition.onerror = function(event) {
            setStatus("Erro no reconhecimento: " + event.error);
        };
    }

    async function falar(texto) {

        try {

            if (audioAtual && tocando) {

                audioAtual.pause();
                audioAtual.currentTime = 0;

                tocando = false;

                setStatus("Áudio interrompido.");

                return;
            }

            setStatus("Gerando áudio...");

            const response = await fetch(
                "http://localhost:8080/audio",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain"
                    },
                    body: texto
                }
            );

            if (!response.ok) {
                throw new Error(
                    "Erro HTTP " + response.status
                );
            }

            const dados =
                await response.json();

            audioAtual =
                new Audio(dados.url);

            audioAtual.onended = () => {

                tocando = false;

                setStatus("Pronto.");

            };

            await audioAtual.play();

            tocando = true;

            setStatus(
                "Reproduzindo áudio..."
            );

        } catch (e) {

            console.error(e);

            if (speechSynthesis.speaking) {

                speechSynthesis.cancel();

                tocando = false;

                setStatus("Áudio interrompido.");

                return;
            }

            const voz =
                new SpeechSynthesisUtterance(
                    texto
                );

            voz.lang = "pt-BR";

            voz.onend = () => {

                tocando = false;

                setStatus("Pronto.");

            };

            tocando = true;

            speechSynthesis.speak(voz);
        }
    }

    function setStatus(texto) {
        document.getElementById("status").innerText = texto;
    }
</script>

</body>
</html>
